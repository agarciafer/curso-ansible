//Comentar lineas
// /var/named/chroot/etc

acl redlocal {
192.168.0.150;
127.0.0.1;
192.168.2.0/24;
192.168.3.0/24;
192.168.2.5;
};

options {
 directory "/var/named";
 listen-on port 53 { 192.168.2.5; };
 forwarders{
  8.8.8.8;
  8.8.4.4;
  
 };
 
 allow-transfer{
  192.168.2.152;
  192.168.2.10;
  };
  
allow-notify {192.168.2.152;};
allow-query { redlocal; };

};

 
zone "." {
 type hint;
 file "named.ca";
};

zone "curso.esp"{
 type master;
 allow-update {
 192.168.2.5/24;
}; 
 file "db.curso";
};


zone "dominio1.esp"{
 type master;
 allow-update {
 192.168.2.0/24;
}; 
 file "db.dominio1";
 };
 
 
zone "dominio2.esp"{
 type master;
 allow-update {
 192.168.2.0/24;
}; 
 file "db.dominio2";
 };
 
 
zone "2.168.192.IN-ADDR.ARPA"{
 type master;
 allow-update {
  192.168.2.0/24;
}; 
 file "db.192.168.2";
};

zone "miempresa.com"{
 type slave;
 file "db.miempresa.com";
 masterfile-format text;
 masters { 192.168.1.151; };
};


