---
- name: MariaDB install and configuration
  hosts: 192.168.2.103
  become: true
  become_method: sudo

  tasks:
    - name: Install MariaDB server
      package:
        name: mariadb-server
        state: present

    - name: Install MariaDB client
      package:
        name: mariadb
        state: latest

    - name: Start and enable MariaDB
      service:
        name: mariadb
        state: started
        enabled: true

    - name: Install PyMySQL
      package:
        name: MySQL-python
        state: present

    - name: Set root password for MariaDB
      mysql_user:
        name: root
        host_all: true
        update_password: always
        password: redhat
      no_log: true
      ignore_errors: true

    - name: Copy user and password to home
      copy:
        src: "{{ playbook_dir }}/my.cnf"
        dest: /root/.my.cnf

    - name: Delete anonymous user
      mysql_user:
        name: ''
        host_all: yes
        state: absent

    - name: Add employees database
      mysql_db:
        name: employees
        state: present
        config_file: /root/.my.cnf

    - name: Copy insert.sql file to tmp
      copy:
        src: "{{ playbook_dir }}/insert.sql"
        dest: /tmp/insert.sql

    - name: Import the insert.sql information into the database
      mysql_db:
        name: employees
        state: import
        target: /tmp/insert.sql
        config_file: /root/.my.cnf

    - name: Add user
      mysql_user:
        name: berto
        password: redhat
        update_password: on_create
        state: present
      no_log: true

    - name: Provide user with privileges
      mysql_user:
        name: berto
        host: localhost
        priv: 'people.*:INSERT,UPDATE,SELECT'
        state: present
